<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雅宝家教兼职平台</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#FDFBF7',
                            primary: '#1A2B3C',
                            accent: '#C5A059',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <style>
        html { overflow-y: auto; }
        body { background-color: #FDFBF7; color: #1A2B3C; overflow-x: hidden; overflow-y: auto; }
        .glass { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(197, 160, 89, 0.4); }
        .card-hover { transition: all 0.4s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(26, 43, 60, 0.1); }
        
        /* 弹窗通用样式 */
        .modal { transition: opacity 0.3s ease, visibility 0.3s ease; opacity: 0; visibility: hidden; pointer-events: none; }
        .modal.active { opacity: 1; visibility: visible; pointer-events: auto; }
        .modal .modal-content { transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); transform: translateY(20px) scale(0.95); }
        .modal.active .modal-content { transform: translateY(0) scale(1); }
        
        .tab-active { border-bottom: 2px solid #C5A059; color: #C5A059; font-weight: 600; }
        .tab-inactive { border-bottom: 2px solid transparent; color: #1A2B3C; opacity: 0.6; }
        .tab-inactive:hover { opacity: 1; }
        
        /* 自定义滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(26, 43, 60, 0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(26, 43, 60, 0.2); }
    </style>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-sans antialiased selection:bg-brand-accent selection:text-white">

    <nav class="fixed w-full z-50 glass py-4 px-6 md:px-12 border-b border-brand-primary/5">
        <div class="max-w-7xl mx-auto relative flex items-center justify-between min-h-[3rem]">
            <a href="/" class="absolute left-0 top-1/2 -translate-y-1/2 flex items-center gap-2 text-base font-medium text-brand-primary/60 hover:text-brand-accent transition-colors decoration-transparent">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> 返回首页
            </a>
            <div class="hidden md:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 items-center gap-8 text-lg font-medium text-brand-primary/70">
                <a href="/k12.html" class="hover:text-brand-accent transition-colors decoration-transparent">K12教育</a>
                <a href="/adult-education.html" class="hover:text-brand-accent transition-colors decoration-transparent">成人教育</a>
                <a href="/tutor" class="text-brand-accent transition-colors decoration-transparent">家教兼职</a>
                <a href="/study-room.html" class="hover:text-brand-accent transition-colors decoration-transparent">自习室</a>
                <a href="/ai-eval.html" class="hover:text-brand-accent transition-colors decoration-transparent">AI评估</a>
            </div>
            <a href="/" class="ml-auto text-2xl font-serif font-bold text-brand-primary tracking-tight decoration-transparent">
                雅宝<span class="text-brand-accent">.</span>
            </a>
        </div>
    </nav>

    <!-- 主体内容区 -->
    <main class="pt-32 pb-24 px-6 md:px-12 min-h-[calc(100vh+12rem)]">
        <div class="max-w-7xl mx-auto">
            
            <!-- 头部说明与发单按钮 -->
            <div class="flex flex-col md:flex-row justify-between items-end mb-12">
                <div class="max-w-2xl">
                    <h1 class="text-4xl font-serif font-bold text-brand-primary mb-4">
                        家教<span class="italic text-brand-accent">大厅</span>
                    </h1>
                    <p class="text-brand-primary/70 text-lg">
                        优质生源与专业教员的对接平台。每个账号均可免费发布或申请接单。
                    </p>
                </div>
                <button onclick="checkAuthAndPost()" class="mt-6 md:mt-0 inline-flex items-center justify-center px-6 py-3 bg-brand-accent text-white font-medium rounded-full btn-hover shadow-lg border-none outline-none cursor-pointer">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i> 免费发布家教
                </button>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-brand-primary/10 mb-10 overflow-x-auto no-scrollbar">
                <button onclick="switchTab('open')" id="tab-open" class="px-6 py-3 tab-active transition-all whitespace-nowrap outline-none">兼职大厅</button>
                <button onclick="switchTab('published')" id="tab-published" class="px-6 py-3 tab-inactive transition-all whitespace-nowrap outline-none">我发布的</button>
                <button onclick="switchTab('accepted')" id="tab-accepted" class="px-6 py-3 tab-inactive transition-all whitespace-nowrap outline-none">我的接单</button>
            </div>

            <!-- 列表容器 -->
            <div id="jobs-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- JS 动态渲染卡片 -->
            </div>
            
            <!-- 加载中提示 -->
            <div id="loading-spinner" class="py-20 text-center text-brand-primary/50 hidden">
                <i data-lucide="loader-2" class="w-8 h-8 mx-auto animate-spin mb-4"></i>
                <p>加载中...</p>
            </div>
            
            <!-- 空状态提示 -->
            <div id="empty-state" class="py-20 text-center text-brand-primary/50 hidden">
                <div class="w-16 h-16 bg-brand-primary/5 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="inbox" class="w-8 h-8"></i>
                </div>
                <p id="empty-message">暂无数据</p>
            </div>
        </div>
    </main>

    <!-- 发布/编辑家教弹窗 -->
    <div id="post-modal" class="modal fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-brand-primary/40 backdrop-blur-sm" onclick="closePostModal()"></div>
        <div class="modal-content relative w-full max-w-2xl bg-white/90 backdrop-blur-xl border border-white/50 rounded-3xl shadow-2xl overflow-hidden z-10 max-h-[90vh] flex flex-col">
            <!-- 弹窗头部 -->
            <div class="px-8 py-6 border-b border-brand-primary/10 flex justify-between items-center bg-white/50 sticky top-0 z-20">
                <div>
                    <h3 id="post-modal-title" class="text-2xl font-serif font-bold text-brand-primary">发布家教需求</h3>
                    <p class="text-sm text-brand-primary/60 mt-1">请详细填写您的需求，以便匹配到合适的老师</p>
                </div>
                <button onclick="closePostModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-brand-primary/5 text-brand-primary/50 hover:text-brand-primary hover:bg-brand-primary/10 transition-colors border-none cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- 弹窗表单内容 -->
            <div class="p-8 overflow-y-auto custom-scrollbar relative">
                <!-- 装饰背景 -->
                <div class="absolute top-0 right-0 w-64 h-64 bg-brand-accent/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
                <div class="absolute bottom-0 left-0 w-64 h-64 bg-brand-primary/5 rounded-full blur-3xl pointer-events-none -z-10"></div>

                <!-- 智能粘贴识别区域 -->
                <div class="mb-6 bg-brand-primary/5 rounded-xl p-4 border border-brand-primary/10">
                    <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider mb-3 flex items-center justify-between">
                        <span>智能识别信息 <span class="text-brand-accent font-normal normal-case">(粘贴文本自动填入下方表单)</span></span>
                        <button type="button" onclick="smartParse()" class="bg-brand-accent text-white hover:bg-brand-accent/90 transition-colors text-sm font-bold cursor-pointer border-none outline-none flex items-center gap-1 px-4 py-2 rounded-lg shadow-md shadow-brand-accent/20 btn-hover">
                            <i data-lucide="wand-2" class="w-4 h-4"></i> 立即识别
                        </button>
                    </label>
                    <textarea id="smart-paste-area" rows="3" placeholder="例如：某某家教1004030号家教&#10;地址：科技园地铁站附近&#10;科目：英语&#10;年级：初一男..." class="w-full px-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm resize-none focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all custom-scrollbar"></textarea>
                </div>

                <form id="post-form" onsubmit="submitPost(event)" class="space-y-6">
                    <input type="hidden" id="p-jobId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider">地址 <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i data-lucide="map-pin" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-primary/40"></i>
                                <input type="text" id="p-address" required placeholder="如: 宝安区棕榈堡花园" class="w-full pl-11 pr-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider">学生年级 <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-primary/40"></i>
                                <input type="text" id="p-grade" required placeholder="如: 初二女孩" class="w-full pl-11 pr-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all">
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider">科目 <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i data-lucide="book-open" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-primary/40"></i>
                                <input type="text" id="p-subject" required placeholder="如: 物理" class="w-full pl-11 pr-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider">费用 <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <i data-lucide="dollar-sign" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-primary/40"></i>
                                <input type="text" id="p-fee" required placeholder="如: 220-240/h" class="w-full pl-11 pr-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all">
                            </div>
                        </div>
                    </div>
                    
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider">时间安排 <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <i data-lucide="clock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-primary/40"></i>
                            <input type="text" id="p-time" required placeholder="如: 一周一次 周六上午" class="w-full pl-11 pr-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all">
                        </div>
                    </div>
                    
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider">学生情况</label>
                        <div class="relative">
                            <i data-lucide="bar-chart" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-primary/40"></i>
                            <input type="text" id="p-studentInfo" placeholder="如: 基础中等语法弱一点" class="w-full pl-11 pr-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all">
                        </div>
                    </div>
                    
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider">老师要求 <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <i data-lucide="check-square" class="absolute left-4 top-4 w-4 h-4 text-brand-primary/40"></i>
                            <textarea id="p-req" required rows="3" placeholder="如: 女老师，沟通能力强，善于互动..." class="w-full pl-11 pr-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm resize-none focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all"></textarea>
                        </div>
                    </div>
                    
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider">备注 <span class="text-brand-primary/40 font-normal">(选填)</span></label>
                        <div class="relative">
                            <i data-lucide="info" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-primary/40"></i>
                            <input type="text" id="p-remark" placeholder="其他补充信息" class="w-full pl-11 pr-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all">
                        </div>
                    </div>
                    
                    <div class="pt-4 border-t border-brand-primary/10">
                        <button type="submit" id="post-submit-btn" class="w-full py-4 bg-brand-primary text-brand-bg font-medium rounded-xl btn-hover border-none cursor-pointer flex justify-center items-center gap-2 shadow-lg shadow-brand-primary/20">
                            <i data-lucide="send" class="w-5 h-5"></i>
                            <span id="post-submit-text">确认发布需求</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 接单弹窗 -->
    <div id="apply-modal" class="modal fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-brand-primary/40 backdrop-blur-sm" onclick="closeApplyModal()"></div>
        <div class="modal-content relative w-full max-w-md bg-white/90 backdrop-blur-xl border border-white/50 rounded-3xl shadow-2xl overflow-hidden z-10">
            <!-- 弹窗头部 -->
            <div class="px-8 py-6 border-b border-brand-primary/10 flex justify-between items-center bg-white/50">
                <div>
                    <h3 class="text-2xl font-serif font-bold text-brand-primary">确认接单</h3>
                    <p class="text-sm text-brand-primary/60 mt-1">留下您的联系方式，教务将与您对接</p>
                </div>
                <button onclick="closeApplyModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-brand-primary/5 text-brand-primary/50 hover:text-brand-primary hover:bg-brand-primary/10 transition-colors border-none cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- 弹窗表单内容 -->
            <div class="p-8 relative">
                <!-- 装饰背景 -->
                <div class="absolute top-0 right-0 w-48 h-48 bg-brand-accent/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
                
                <form id="apply-form" onsubmit="submitApply(event)" class="space-y-6">
                    <input type="hidden" id="a-jobId">
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider">老师姓名 <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-primary/40"></i>
                            <input type="text" id="a-name" required placeholder="您的真实姓名" class="w-full pl-11 pr-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-brand-primary/80 uppercase tracking-wider">联系电话 <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-primary/40"></i>
                            <input type="tel" id="a-phone" required placeholder="您的手机号码" class="w-full pl-11 pr-4 py-3 bg-white/80 border border-brand-primary/10 rounded-xl text-sm focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 outline-none transition-all">
                        </div>
                    </div>
                    <div class="pt-4 border-t border-brand-primary/10">
                        <button type="submit" id="apply-submit-btn" class="w-full py-4 bg-brand-accent text-white font-medium rounded-xl btn-hover border-none cursor-pointer flex justify-center items-center gap-2 shadow-lg shadow-brand-accent/20">
                            <i data-lucide="check-circle" class="w-5 h-5"></i>
                            确认申请接单
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 错误/提示 弹窗 -->
    <div id="alert-modal" class="modal fixed inset-0 z-[110] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-brand-primary/40 backdrop-blur-sm" onclick="closeAlertModal()"></div>
        <div class="modal-content relative w-full max-w-sm bg-white rounded-2xl shadow-2xl overflow-hidden z-10">
            <div class="p-8 text-center">
                <div id="alert-icon-container" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i id="alert-icon" data-lucide="info" class="w-8 h-8"></i>
                </div>
                <h3 id="alert-title" class="text-xl font-bold text-brand-primary mb-2">提示</h3>
                <p id="alert-message" class="text-sm text-brand-primary/70 mb-6 leading-relaxed"></p>
                <button onclick="closeAlertModal()" id="alert-btn" class="w-full py-3 text-white font-medium rounded-xl btn-hover shadow-lg border-none cursor-pointer">
                    我知道了
                </button>
            </div>
        </div>
    </div>

    <!-- 确认操作 弹窗 -->
    <div id="confirm-modal" class="modal fixed inset-0 z-[110] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-brand-primary/40 backdrop-blur-sm" onclick="closeConfirmModal()"></div>
        <div class="modal-content relative w-full max-w-sm bg-white rounded-2xl shadow-2xl overflow-hidden z-10">
            <div class="p-8 text-center">
                <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="alert-triangle" class="w-8 h-8"></i>
                </div>
                <h3 id="confirm-title" class="text-xl font-bold text-brand-primary mb-2">确认操作</h3>
                <p id="confirm-message" class="text-sm text-brand-primary/70 mb-6 leading-relaxed"></p>
                <div class="flex gap-4">
                    <button onclick="closeConfirmModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-medium rounded-xl hover:bg-gray-200 transition-colors border-none cursor-pointer">
                        取消
                    </button>
                    <button id="confirm-btn" class="flex-1 py-3 bg-red-500 text-white font-medium rounded-xl btn-hover hover:bg-red-600 shadow-lg border-none cursor-pointer">
                        确定
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 状态管理
        let currentTab = 'open';
        let jobsData = [];
        
        // 自定义弹窗 API
        function customAlert(title, message, type = 'info') {
            const modal = document.getElementById('alert-modal');
            const iconContainer = document.getElementById('alert-icon-container');
            const icon = document.getElementById('alert-icon');
            const btn = document.getElementById('alert-btn');
            
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-message').innerHTML = message.replace(/\n/g, '<br>');
            
            if (type === 'error') {
                iconContainer.className = 'w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4';
                icon.setAttribute('data-lucide', 'x-circle');
                btn.className = 'w-full py-3 bg-red-500 hover:bg-red-600 text-white font-medium rounded-xl btn-hover shadow-lg border-none cursor-pointer';
            } else if (type === 'success') {
                iconContainer.className = 'w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4';
                icon.setAttribute('data-lucide', 'check-circle');
                btn.className = 'w-full py-3 bg-green-500 hover:bg-green-600 text-white font-medium rounded-xl btn-hover shadow-lg border-none cursor-pointer';
            } else {
                iconContainer.className = 'w-16 h-16 bg-brand-primary/5 text-brand-primary rounded-full flex items-center justify-center mx-auto mb-4';
                icon.setAttribute('data-lucide', 'info');
                btn.className = 'w-full py-3 bg-brand-primary hover:bg-brand-primary/90 text-white font-medium rounded-xl btn-hover shadow-lg border-none cursor-pointer';
            }
            
            lucide.createIcons();
            modal.classList.add('active');
        }
        
        function closeAlertModal() {
            document.getElementById('alert-modal').classList.remove('active');
        }

        function customConfirm(title, message, confirmCallback) {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-message').innerText = message;
            
            const confirmBtn = document.getElementById('confirm-btn');
            // 移除旧的事件监听器
            const newBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
            
            newBtn.addEventListener('click', () => {
                closeConfirmModal();
                confirmCallback();
            });
            
            document.getElementById('confirm-modal').classList.add('active');
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.remove('active');
        }

        // 鉴权拦截器
        function getToken() {
            return localStorage.getItem('tutor_token');
        }
        function getEmail() {
            return localStorage.getItem('tutor_email');
        }
        
        // 初始化UI
        function initUI() {
            // 旧菜单栏账号按钮已删除，这里保留空实现避免残留调用影响页面行为。
        }

        function goToLogin() {
            window.location.href = '/#login';
        }

        function logout() {
            customConfirm('退出登录', '您确定要退出当前账号吗？', () => {
                localStorage.removeItem('tutor_token');
                localStorage.removeItem('tutor_email');
                initUI();
                if (currentTab !== 'open') switchTab('open');
                else fetchJobs();
            });
        }

        // Fetch 带 Token
        async function apiFetch(url, options = {}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) {
                logout();
                goToLogin();
                throw new Error('Unauthorized');
            }
            return response;
        }

        // 登录逻辑
        function openLoginModal() {}
        function closeLoginModal() {}

        async function sendCode() {
            const email = document.getElementById('login-email').value;
            if (!email) return customAlert('提示', '请填写邮箱', 'error');
            
            const btn = document.getElementById('send-code-btn');
            btn.disabled = true;
            btn.innerText = '发送中...';
            
            try {
                const res = await fetch('/api/tutor/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    if (data.debugCode) {
                        customAlert('测试环境提示', `您的验证码是: <strong class="text-xl text-brand-accent tracking-widest">${data.debugCode}</strong>\n(线上环境配好邮件后不会弹出此提示)`, 'info');
                    } else {
                        customAlert('发送成功', '验证码已发送到您的邮箱，请注意查收。', 'success');
                    }

                    let sec = 60;
                    const timer = setInterval(() => {
                        sec--;
                        btn.innerText = `${sec}s 后重发`;
                        if (sec <= 0) {
                            clearInterval(timer);
                            btn.innerText = '获取验证码';
                            btn.disabled = false;
                        }
                    }, 1000);
                } else {
                    customAlert('发送失败', data.error || '无法发送验证码', 'error');
                    btn.innerText = '获取验证码';
                    btn.disabled = false;
                }
            } catch (e) {
                customAlert('网络错误', '请检查您的网络连接', 'error');
                btn.innerText = '获取验证码';
                btn.disabled = false;
            }
        }

        async function submitLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const code = document.getElementById('login-code').value;
            const btn = document.getElementById('login-submit-btn');
            btn.innerText = '登录中...';
            
            try {
                const res = await fetch('/api/tutor/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('tutor_token', data.token);
                    localStorage.setItem('tutor_email', data.email);
                    closeLoginModal();
                    initUI();
                    fetchJobs();
                    customAlert('登录成功', `欢迎回来，${data.email}`, 'success');
                } else {
                    customAlert('登录失败', data.error || '验证码不正确', 'error');
                }
            } catch (e) {
                customAlert('网络错误', '请检查您的网络连接', 'error');
            } finally {
                btn.innerText = '登录 / 注册';
            }
        }

        // Tab 切换
        function switchTab(tab) {
            if ((tab === 'published' || tab === 'accepted') && !getToken()) {
                return goToLogin();
            }
            
            ['open', 'published', 'accepted'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    el.classList.replace('tab-inactive', 'tab-active');
                } else {
                    el.classList.replace('tab-active', 'tab-inactive');
                }
            });
            currentTab = tab;
            fetchJobs();
        }

        // 获取并渲染列表
        async function fetchJobs() {
            document.getElementById('jobs-container').innerHTML = '';
            document.getElementById('loading-spinner').style.display = 'block';
            document.getElementById('empty-state').style.display = 'none';
            
            try {
                const res = await apiFetch(`/api/tutor/jobs?type=${currentTab}`);
                const data = await res.json();
                document.getElementById('loading-spinner').style.display = 'none';
                
                if (data.data.length === 0) {
                    document.getElementById('empty-message').innerText = currentTab === 'open' ? '大厅暂无开放接单的家教' : '暂无数据';
                    document.getElementById('empty-state').style.display = 'block';
                } else {
                    jobsData = data.data; // Store globally for editing
                    renderJobs(data.data);
                }
            } catch (e) {
                document.getElementById('loading-spinner').style.display = 'none';
            }
        }

        function renderJobs(jobs) {
            const container = document.getElementById('jobs-container');
            const currentUser = getEmail();
            const isAdmin = currentUser === 'admin@yabao.com';
            
            jobs.forEach(job => {
                let badge = '';
                let actionBtn = '';

                if (currentTab === 'open') {
                    badge = `<span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full">可接单</span>`;
                    
                    let editBtnHtml = '';
                    if (job.canEdit || isAdmin) {
                        editBtnHtml = `<button onclick="openEditModal('${job.id}')" class="w-full mt-2 py-3 bg-blue-50 text-blue-600 font-medium rounded-xl btn-hover hover:bg-blue-100 transition-colors cursor-pointer border-none outline-none">编辑信息 ${isAdmin ? '(管理员)' : ''}</button>`;
                    }
                    
                    let deleteBtnHtml = '';
                    if (isAdmin) {
                        deleteBtnHtml = `<button onclick="deleteJob('${job.id}')" class="w-full mt-2 py-3 bg-red-50 text-red-600 font-medium rounded-xl btn-hover hover:bg-red-100 transition-colors cursor-pointer border-none outline-none">删除此岗位 (管理员)</button>`;
                    }

                    if (job.publisherEmail === currentUser && !isAdmin) {
                        actionBtn = `<button disabled class="w-full py-3 bg-gray-100 text-gray-400 font-medium rounded-xl border-none cursor-not-allowed">这是你发布的岗位</button>${editBtnHtml}`;
                    } else {
                        actionBtn = `<button onclick="openApplyModal('${job.id}')" class="w-full py-3 bg-transparent border border-brand-accent text-brand-accent font-medium rounded-xl btn-hover hover:bg-brand-accent hover:text-white transition-colors cursor-pointer outline-none">我要接单</button>${editBtnHtml}${deleteBtnHtml}`;
                    }
                } 
                else if (currentTab === 'published') {
                    let editBtnHtml = '';
                    if (job.canEdit || isAdmin) {
                        editBtnHtml = `<button onclick="openEditModal('${job.id}')" class="w-full mb-2 py-3 bg-blue-50 text-blue-600 font-medium rounded-xl btn-hover hover:bg-blue-100 transition-colors cursor-pointer border-none outline-none">编辑信息</button>`;
                    }

                    if (job.status === 'open') {
                        badge = `<span class="px-3 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-full">等待接单</span>`;
                        actionBtn = `${editBtnHtml}<button onclick="deleteJob('${job.id}')" class="w-full py-3 bg-red-50 text-red-600 font-medium rounded-xl btn-hover hover:bg-red-100 transition-colors cursor-pointer border-none outline-none">删除此岗位</button>`;
                    } else {
                        badge = `<span class="px-3 py-1 bg-gray-100 text-gray-700 text-xs font-bold rounded-full">已被接单</span>`;
                        actionBtn = `<div class="p-3 bg-gray-50 rounded-xl text-sm text-center text-gray-600 mb-2">接单人: ${job.acceptedByName} (${job.acceptedByPhone})</div>
                                     ${editBtnHtml}
                                     <button onclick="deleteJob('${job.id}')" class="w-full py-2 bg-transparent text-red-500 text-sm font-medium rounded-lg hover:underline cursor-pointer border-none outline-none">强制删除</button>`;
                    }
                }
                else if (currentTab === 'accepted') {
                    badge = `<span class="px-3 py-1 bg-brand-accent/20 text-brand-accent text-xs font-bold rounded-full">已接单</span>`;
                    actionBtn = `<button onclick="cancelApply('${job.id}')" class="w-full py-3 bg-red-50 text-red-600 font-medium rounded-xl btn-hover hover:bg-red-100 transition-colors cursor-pointer border-none outline-none">取消接单 (退回大厅)</button>`;
                }

                const card = `
                    <div class="glass rounded-2xl p-8 card-hover flex flex-col h-full relative overflow-hidden">
                        <!-- 装饰性背景光晕 -->
                        <div class="absolute -top-10 -right-10 w-32 h-32 bg-brand-accent/10 rounded-full blur-2xl pointer-events-none"></div>
                        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-brand-primary/5 rounded-full blur-2xl pointer-events-none"></div>
                        
                        <div class="flex-grow relative z-10">
                            <div class="flex justify-between items-start mb-6">
                                <h3 class="text-xl font-bold text-brand-primary">${job.subject} - ${job.grade}</h3>
                                ${badge}
                            </div>
                            <div class="space-y-4 text-sm text-brand-primary/80 mb-8">
                                <div class="flex items-start">
                                    <i data-lucide="map-pin" class="w-4 h-4 text-brand-accent mr-3 mt-0.5 shrink-0"></i>
                                    <span class="w-16 font-bold shrink-0">【地址】</span>
                                    <span class="flex-grow leading-relaxed">${job.address}</span>
                                </div>
                                <div class="flex items-start">
                                    <i data-lucide="bar-chart" class="w-4 h-4 text-brand-accent mr-3 mt-0.5 shrink-0"></i>
                                    <span class="w-16 font-bold shrink-0">【情况】</span>
                                    <span class="flex-grow leading-relaxed">${job.studentInfo || '无'}</span>
                                </div>
                                <div class="flex items-start">
                                    <i data-lucide="clock" class="w-4 h-4 text-brand-accent mr-3 mt-0.5 shrink-0"></i>
                                    <span class="w-16 font-bold shrink-0">【时间】</span>
                                    <span class="flex-grow leading-relaxed">${job.time}</span>
                                </div>
                                <div class="flex items-start">
                                    <i data-lucide="dollar-sign" class="w-4 h-4 text-brand-accent mr-3 mt-0.5 shrink-0"></i>
                                    <span class="w-16 font-bold shrink-0">【费用】</span>
                                    <span class="flex-grow leading-relaxed font-semibold text-brand-accent">${job.fee}</span>
                                </div>
                                <div class="flex items-start bg-white/50 border border-brand-primary/5 p-4 rounded-xl mt-4">
                                    <span class="w-16 font-bold text-brand-primary/90 shrink-0">【要求】</span>
                                    <span class="flex-grow leading-relaxed text-brand-primary/90">${job.requirement}</span>
                                </div>
                                ${job.remark ? `
                                <div class="flex items-start text-brand-primary/50 text-xs mt-2">
                                    <span class="w-16 shrink-0">【备注】</span>
                                    <span class="flex-grow leading-relaxed">${job.remark}</span>
                                </div>` : ''}

                        <div class="mt-auto pt-4 border-t border-brand-primary/10 relative z-10">

                container.insertAdjacentHTML('beforeend', card);
            });
            lucide.createIcons();
        }

        // 发布/编辑逻辑
        function checkAuthAndPost() {
            if (!getToken()) return goToLogin();
            document.getElementById('post-form').reset();
            document.getElementById('smart-paste-area').value = '';
            document.getElementById('p-jobId').value = '';
            document.getElementById('post-modal-title').innerText = '发布家教需求';
            document.getElementById('post-submit-text').innerText = '确认发布需求';
            document.getElementById('post-modal').classList.add('active');
        }

        function openEditModal(id) {
            const job = jobsData.find(j => j.id === id);
            if (!job) return;
            
            // 清空智能识别区域的上次内容
            document.getElementById('smart-paste-area').value = '';
            
            document.getElementById('p-jobId').value = job.id;
            document.getElementById('p-address').value = job.address;
            document.getElementById('p-grade').value = job.grade;
            document.getElementById('p-subject').value = job.subject;
            document.getElementById('p-fee').value = job.fee;
            document.getElementById('p-time').value = job.time;
            document.getElementById('p-studentInfo').value = job.studentInfo || '';
            document.getElementById('p-req').value = job.requirement;
            document.getElementById('p-remark').value = job.remark || '';

            document.getElementById('post-modal-title').innerText = '编辑家教需求';
            document.getElementById('post-submit-text').innerText = '保存修改';
            document.getElementById('post-modal').classList.add('active');
        }

        function closePostModal() { document.getElementById('post-modal').classList.remove('active'); }

        // 智能解析粘贴文本
        function smartParse() {
            const text = document.getElementById('smart-paste-area').value.trim();
            if (!text) {
                return customAlert('提示', '请先在上方文本框内粘贴信息', 'info');
            }

            // 简单正则匹配规则 (可根据实际情况不断优化)
            const patterns = {
                address: /(?:地址|位置|小区|坐标)[:：\s]+([^\n]+)/i,
                grade: /(?:年级|学生)[:：\s]+([^\n]+)/i,
                subject: /(?:科目|补习|学科)[:：\s]+([^\n]+)/i,
                studentInfo: /(?:情况|基础|成绩)[:：\s]+([^\n]+)/i,
                time: /(?:时间|安排|频率)[:：\s]+([^\n]+)/i,
                fee: /(?:费用|价格|薪水|报酬|课酬)[:：\s]+([^\n]+)/i,
                requirement: /(?:要求|教员|老师)[:：\s]+([^\n]+)/i,
                remark: /(?:备注|说明|其他)[:：\s]+([^\n]+)/i,
            };

            const data = {
                address: '', grade: '', subject: '', studentInfo: '',
                time: '', fee: '', requirement: '', remark: ''
            };

            // 1. 尝试使用明确的冒号/空格标识符进行提取
            for (const [key, regex] of Object.entries(patterns)) {
                const match = text.match(regex);
                if (match && match[1]) {
                    data[key] = match[1].trim();
                }
            }

            // 2. 如果第一步有些核心字段没取到，尝试通过关键字猜测单行信息
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            lines.forEach(line => {
                if (!data.grade && (line.includes('初') || line.includes('高') || line.includes('小') || line.includes('年级'))) {
                    if (!line.includes('要求')) data.grade = line;
                }
                if (!data.subject && (line.includes('语文') || line.includes('数学') || line.includes('英语') || line.includes('物理') || line.includes('化学'))) {
                    if (!line.includes('要求') && !line.includes('备注')) data.subject = line;
                }
                if (!data.fee && (line.includes('/h') || line.includes('小时') || line.includes('次'))) {
                    if (line.match(/\d+/)) data.fee = line;
                }
            });

            // 填充表单
            if(data.address) document.getElementById('p-address').value = data.address;
            if(data.grade) document.getElementById('p-grade').value = data.grade;
            if(data.subject) document.getElementById('p-subject').value = data.subject;
            if(data.studentInfo) document.getElementById('p-studentInfo').value = data.studentInfo;
            if(data.time) document.getElementById('p-time').value = data.time;
            if(data.fee) document.getElementById('p-fee').value = data.fee;
            if(data.requirement) document.getElementById('p-req').value = data.requirement;
            if(data.remark) document.getElementById('p-remark').value = data.remark;

            // 提示用户检查
            customAlert('解析完成', '已尽可能为您提取信息并填入表单，<strong class="text-red-500">请务必人工核对修改后再提交！</strong>', 'success');
        }

        async function submitPost(e) {
            e.preventDefault();
            const btnText = document.getElementById('post-submit-text');
            const originalText = btnText.innerText;
            const btn = document.getElementById('post-submit-btn');
            
            btnText.innerText = '提交中...';
            btn.disabled = true;

            const jobId = document.getElementById('p-jobId').value;
            const isEdit = !!jobId;

            const payload = {
                address: document.getElementById('p-address').value,
                grade: document.getElementById('p-grade').value,
                subject: document.getElementById('p-subject').value,
                studentInfo: document.getElementById('p-studentInfo').value,
                time: document.getElementById('p-time').value,
                fee: document.getElementById('p-fee').value,
                requirement: document.getElementById('p-req').value,
                remark: document.getElementById('p-remark').value
            };

            if (isEdit) payload.id = jobId;

            try {
                const res = await apiFetch(isEdit ? '/api/tutor/job/edit' : '/api/tutor/job/post', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    closePostModal();
                    document.getElementById('post-form').reset();
                    customAlert(isEdit ? '保存成功' : '发布成功', isEdit ? '家教需求已更新。' : '您的家教需求已成功发布到大厅。', 'success');
                    if (currentTab === 'published' || currentTab === 'open') fetchJobs();
                    else switchTab('published');
                } else {
                    const data = await res.json();
                    customAlert(isEdit ? '保存失败' : '发布失败', data.error || '无法提交，请稍后再试。', 'error');
                }
            } catch (e) {
                customAlert('网络错误', '请检查您的网络连接', 'error');
            } finally {
                btnText.innerText = originalText;
                btn.disabled = false;
            }
        }

        // 接单逻辑
        function openApplyModal(id) {
            if (!getToken()) return goToLogin();
            document.getElementById('a-jobId').value = id;
            document.getElementById('apply-modal').classList.add('active');
        }
        function closeApplyModal() { document.getElementById('apply-modal').classList.remove('active'); }

        async function submitApply(e) {
            e.preventDefault();
            const btn = document.getElementById('apply-submit-btn');
            btn.innerText = '申请中...';
            btn.disabled = true;

            try {
                const res = await apiFetch('/api/tutor/job/accept', {
                    method: 'POST',
                    body: JSON.stringify({
                        id: document.getElementById('a-jobId').value,
                        name: document.getElementById('a-name').value,
                        phone: document.getElementById('a-phone').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    closeApplyModal();
                    customAlert('接单成功', '您已成功接下该家教单，请注意查看企业微信群通知或等待教务联系。', 'success');
                    switchTab('accepted');
                } else {
                    customAlert('接单失败', data.error || '该岗位可能已被抢走或发生错误。', 'error');
                }
            } catch (e) {
                customAlert('网络错误', '请检查您的网络连接', 'error');
            } finally {
                btn.innerText = '确认申请接单';
                btn.disabled = false;
            }
        }

        // 删除 & 取消逻辑
        function deleteJob(id) {
            if (!getToken()) return goToLogin();
            customConfirm('删除岗位', '确定要永久删除这个家教岗位吗？此操作不可恢复。', async () => {
                try {
                    const res = await apiFetch('/api/tutor/job/delete', { method: 'POST', body: JSON.stringify({ id }) });
                    if (res.ok) {
                        customAlert('删除成功', '岗位已删除', 'success');
                        fetchJobs();
                    } else {
                        customAlert('删除失败', '无法删除该岗位，请稍后再试', 'error');
                    }
                } catch (e) {
                    customAlert('网络错误', '请检查网络连接', 'error');
                }
            });
        }

        function cancelApply(id) {
            if (!getToken()) return goToLogin();
            customConfirm('取消接单', '确定要放弃这个家教单并将其退回大厅吗？', async () => {
                try {
                    const res = await apiFetch('/api/tutor/job/cancel', { method: 'POST', body: JSON.stringify({ id }) });
                    if (res.ok) {
                        customAlert('已取消', '该订单已退回大厅', 'success');
                        fetchJobs();
                    } else {
                        customAlert('取消失败', '操作失败，请重试', 'error');
                    }
                } catch (e) {
                    customAlert('网络错误', '请检查网络连接', 'error');
                }
            });
        }

        // 初始化
        initUI();
        fetchJobs();
    </script>
