<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雅宝 AI 自习室 - 学习控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#FDFBF7',
                            primary: '#1A2B3C',
                            accent: '#C5A059',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FDFBF7; color: #1A2B3C; font-family: system-ui, -apple-system, sans-serif; }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
        
        .chat-bubble { animation: popIn 0.3s ease-out forwards; }
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 顶部导航 -->
    <header class="bg-white/80 backdrop-blur-md border-b border-brand-primary/10 h-16 flex items-center justify-between px-6 shrink-0 z-10">
        <div class="flex items-center gap-4">
            <a href="/" class="text-xl font-bold text-brand-primary tracking-tight">雅宝<span class="text-brand-accent">.</span></a>
            <div class="h-4 w-px bg-gray-300"></div>
            <span class="text-sm font-medium text-gray-600">AI 自习室控制台</span>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 px-3 py-1 bg-green-50 text-green-700 text-xs font-bold rounded-full border border-green-200">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> AI 学伴在线
            </div>
        </div>
    </header>

    <!-- 主体区域 -->
    <main class="flex-1 flex flex-col md:flex-row gap-6 p-6 overflow-hidden max-w-7xl mx-auto w-full">
        
        <!-- 左侧：工具区 (计时器 + 待办) -->
        <div class="w-full md:w-1/3 flex flex-col gap-6 h-full">
            
            <!-- 1. 沉浸计时器 -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center shrink-0">
                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">沉浸番茄钟</h2>
                <div id="timer-display" class="text-6xl font-mono font-bold text-brand-primary mb-6 tracking-tighter">25:00</div>
                <div class="flex gap-3 w-full">
                    <button id="btn-start" onclick="toggleTimer()" class="flex-1 py-3 bg-brand-primary text-white font-medium rounded-xl hover:bg-brand-primary/90 transition-colors shadow-md">
                        开始专注
                    </button>
                    <button onclick="resetTimer()" class="px-5 py-3 bg-gray-100 text-gray-600 font-medium rounded-xl hover:bg-gray-200 transition-colors">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- 2. 今日任务清单 -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col flex-1 overflow-hidden">
                <div class="p-5 border-b border-gray-100 flex items-center justify-between">
                    <h2 class="font-bold text-brand-primary flex items-center gap-2">
                        <i data-lucide="check-square" class="w-5 h-5 text-brand-accent"></i> 今日任务
                    </h2>
                    <span id="task-stats" class="text-xs font-bold text-brand-accent bg-brand-accent/10 px-2 py-1 rounded">0/0</span>
                </div>
                
                <div class="p-4 flex gap-2 shrink-0">
                    <input type="text" id="todo-input" placeholder="输入新任务，按回车添加..." class="flex-1 bg-gray-50 border-none rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-brand-accent text-brand-primary">
                    <button onclick="addTodo()" class="px-4 py-2.5 bg-brand-accent text-white rounded-lg hover:bg-brand-accent/90 transition-colors">
                        添加
                    </button>
                </div>

                <ul id="todo-list" class="flex-1 overflow-y-auto p-4 pt-0 space-y-2">
                    <!-- 任务列表将由 JS 动态生成 -->
                </ul>
            </div>
        </div>

        <!-- 右侧：AI 学伴答疑聊天 -->
        <div class="w-full md:w-2/3 bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full overflow-hidden">
            <div class="p-5 border-b border-gray-100 flex items-center gap-3 shrink-0 bg-gray-50/50">
                <div class="w-10 h-10 rounded-full bg-brand-accent/20 flex items-center justify-center">
                    <i data-lucide="bot" class="w-6 h-6 text-brand-accent"></i>
                </div>
                <div>
                    <h2 class="font-bold text-brand-primary text-base">AI 专属学伴</h2>
                    <p class="text-xs text-gray-500">有任何不会的题目，随时发给我</p>
                </div>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6 bg-gray-50/30">
                <!-- AI 欢迎语 -->
                <div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full bg-brand-accent/10 flex items-center justify-center shrink-0 mt-1">
                        <i data-lucide="sparkles" class="w-4 h-4 text-brand-accent"></i>
                    </div>
                    <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 text-sm text-brand-primary leading-relaxed max-w-[85%]">
                        你好！我是你的 AI 学习助手。你可以直接在这里输入你遇到的问题，我会为你提供详细的解答和知识点分析。准备好开始今天的学习了吗？
                    </div>
                </div>
            </div>

            <div class="p-4 bg-white border-t border-gray-100 shrink-0">
                <div class="flex items-end gap-3 bg-gray-50 rounded-xl p-2 border border-gray-200 focus-within:border-brand-accent/50 focus-within:bg-white transition-colors">
                    <textarea id="chat-input" rows="1" placeholder="输入问题..." class="flex-1 bg-transparent border-none resize-none py-2 px-3 text-sm focus:outline-none text-brand-primary max-h-32" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button onclick="sendMessage()" class="p-2.5 bg-brand-primary text-white rounded-lg hover:bg-brand-primary/90 transition-colors shadow-sm shrink-0 mb-0.5">
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="text-center mt-2 text-[10px] text-gray-400">当前为本地演示模式，对话记录将保存在浏览器中</div>
            </div>
        </div>

    </main>

    <script>
        lucide.createIcons();

        // ==========================================
        // 1. 沉浸番茄钟逻辑
        // ==========================================
        let timerDuration = 25 * 60; // 默认 25 分钟
        let timeLeft = timerDuration;
        let timerId = null;
        let isRunning = false;
        const timeDisplay = document.getElementById('timer-display');
        const btnStart = document.getElementById('btn-start');

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timeDisplay.textContent = `${m}:${s}`;
        }

        function toggleTimer() {
            if (isRunning) {
                // 暂停
                clearInterval(timerId);
                isRunning = false;
                btnStart.textContent = "继续专注";
                btnStart.classList.replace('bg-red-500', 'bg-brand-primary');
                btnStart.classList.replace('hover:bg-red-600', 'hover:bg-brand-primary/90');
            } else {
                // 开始
                isRunning = true;
                btnStart.textContent = "暂停计时";
                btnStart.classList.replace('bg-brand-primary', 'bg-red-500');
                btnStart.classList.replace('hover:bg-brand-primary/90', 'hover:bg-red-600');
                
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerId);
                        isRunning = false;
                        alert("专注时间到！休息一下吧。");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = timerDuration;
            updateTimerDisplay();
            btnStart.textContent = "开始专注";
            btnStart.className = "flex-1 py-3 bg-brand-primary text-white font-medium rounded-xl hover:bg-brand-primary/90 transition-colors shadow-md";
        }
        
        // 初始化显示
        updateTimerDisplay();


        // ==========================================
        // 2. 真实可用的任务清单 (LocalStorage 持久化)
        // ==========================================
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const taskStats = document.getElementById('task-stats');
        
        // 从 localStorage 读取数据
        let todos = JSON.parse(localStorage.getItem('yabao_study_todos')) || [
            { text: '复习物理电磁学错题', done: false },
            { text: '完成英语阅读理解真题', done: true }
        ];

        function saveTodos() {
            localStorage.setItem('yabao_study_todos', JSON.stringify(todos));
            renderTodos();
        }

        function renderTodos() {
            todoList.innerHTML = '';
            let completed = 0;

            todos.forEach((todo, index) => {
                if (todo.done) completed++;
                const li = document.createElement('li');
                li.className = `flex items-start gap-3 p-3 rounded-xl border transition-colors group ${todo.done ? 'bg-gray-50 border-transparent' : 'bg-white border-gray-100 hover:border-brand-accent/40'}`;
                
                li.innerHTML = `
                    <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${index})" class="mt-1 w-4 h-4 text-brand-accent rounded border-gray-300 focus:ring-brand-accent accent-brand-accent cursor-pointer shrink-0">
                    <span class="flex-1 text-sm font-medium ${todo.done ? 'text-gray-400 line-through' : 'text-brand-primary'} break-all">${todo.text}</span>
                    <button onclick="deleteTodo(${index})" class="text-red-400 opacity-0 group-hover:opacity-100 hover:text-red-600 transition-opacity p-1 shrink-0">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                todoList.appendChild(li);
            });

            // 更新统计
            taskStats.textContent = `${completed}/${todos.length} 完成`;
            if (completed === todos.length && todos.length > 0) {
                taskStats.className = "text-xs font-bold text-green-600 bg-green-100 px-2 py-1 rounded";
            } else {
                taskStats.className = "text-xs font-bold text-brand-accent bg-brand-accent/10 px-2 py-1 rounded";
            }
            
            lucide.createIcons();
        }

        function addTodo() {
            const text = todoInput.value.trim();
            if (text) {
                todos.push({ text, done: false });
                todoInput.value = '';
                saveTodos();
            }
        }

        function toggleTodo(index) {
            todos[index].done = !todos[index].done;
            saveTodos();
        }

        function deleteTodo(index) {
            todos.splice(index, 1);
            saveTodos();
        }

        // 回车添加任务
        todoInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTodo();
            }
        });

        // 初始化渲染任务
        renderTodos();


        // ==========================================
        // 3. AI 学伴聊天逻辑 (交互模拟)
        // ==========================================
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex gap-4 chat-bubble ${isUser ? 'flex-row-reverse' : ''}`;
            
            const avatarHtml = isUser 
                ? `<div class="w-8 h-8 rounded-full bg-brand-primary flex items-center justify-center shrink-0 mt-1"><i data-lucide="user" class="w-4 h-4 text-white"></i></div>`
                : `<div class="w-8 h-8 rounded-full bg-brand-accent/10 flex items-center justify-center shrink-0 mt-1"><i data-lucide="bot" class="w-4 h-4 text-brand-accent"></i></div>`;
                
            const bubbleHtml = isUser
                ? `<div class="bg-brand-primary text-white p-4 rounded-2xl rounded-tr-none shadow-sm text-sm leading-relaxed max-w-[85%] break-words whitespace-pre-wrap">${text}</div>`
                : `<div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 text-sm text-brand-primary leading-relaxed max-w-[85%] break-words whitespace-pre-wrap">${text}</div>`;

            div.innerHTML = avatarHtml + bubbleHtml;
            chatMessages.appendChild(div);
            lucide.createIcons();
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // 添加用户消息
            appendMessage(text, true);
            chatInput.value = '';
            chatInput.style.height = 'auto'; // 重置高度

            // 模拟 AI 思考和回复
            setTimeout(() => {
                const responses = [
                    `我已经收到了你的问题：“${text}”。\n\n目前我是演示模式，在正式接入本地大模型后，我将立刻为你生成详细的解题步骤。你可以先把它加到左侧的任务清单中！`,
                    `这是一个很好的问题！这涉及到基础知识的综合运用。你可以先回顾一下课本的对应章节，等系统正式上线，我会为你提供靶向训练题。`,
                    `了解了！学习累了可以点击左侧的“开始专注”番茄钟，我们一起来进行一个 25 分钟的沉浸式学习吧。`
                ];
                const reply = responses[Math.floor(Math.random() * responses.length)];
                appendMessage(reply, false);
            }, 800);
        }

        // 回车发送消息 (Shift+Enter 换行)
        chatInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

    </script>
</body>
</html>
